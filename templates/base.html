{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Boardgame World{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="app">
<header class="topbar">
  <div class="container">
    <div class="topbar-inner">
      <a class="brand" href="{% url 'home' %}" aria-label="Boardgame World">
        <img src="{% static 'img/logo.png' %}" alt="Boardgame World logo" class="brand-icon">
        <span class="brand-text">Boardgame World</span>
      </a>

      <nav class="navlinks" aria-label="Primary">
        <a class="navlink" href="{% url 'games:list' %}">Games</a>
        <a class="navlink" href="{% url 'genre-list' %}">Genres</a>
        <a class="navlink" href="{% url 'collections:list' %}">Collections</a>
        <a class="navlink" href="{% url 'reviews:list' %}">Reviews</a>
        <span class="nav-sep" aria-hidden="true">•</span>
        <a class="navlink navlink-cta" href="{% url 'games:create' %}">Add game</a>
      </nav>
    </div>
  </div>
</header>

<main class="container content">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-left">© {% now "Y" %} Boardgames</div>
    <div class="footer-right">Django study project</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
